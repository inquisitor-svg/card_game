services:
  backend:
    build:
      context: ./backend
    container_name: german-learning-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EXTERNAL_EVALUATION_URL: ${EXTERNAL_EVALUATION_URL:-}
      EXTERNAL_EVALUATION_KEY: ${EXTERNAL_EVALUATION_KEY:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    container_name: german-learning-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
